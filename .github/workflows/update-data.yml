name: Refresh portfolio data

on:
  workflow_dispatch:
    inputs:
      skip_news:
        description: Skip news and announcement refresh
        required: false
        type: boolean
        default: false
      skip_results:
        description: Skip financial result refresh
        required: false
        type: boolean
        default: false
  schedule:
    - cron: '17 18 * * 1-5'
      timezone: 'Asia/Kolkata'

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: portfolio-refresh
  cancel-in-progress: false

jobs:
  refresh:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt
      - name: Install data dependencies
        run: pip install -r scripts/requirements.txt
      - name: Preserve preceding snapshot for transition alerts
        run: cp data/market.json /tmp/market-before.json 2>/dev/null || echo '[]' > /tmp/market-before.json
      - name: Update prices, technicals, results and announcements
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5-mini' }}
          AI_MAX_ITEMS: ${{ vars.AI_MAX_ITEMS || '15' }}
        run: |
          FLAGS=""
          if [ "${{ inputs.skip_news }}" = "true" ]; then FLAGS="$FLAGS --skip-news"; fi
          if [ "${{ inputs.skip_results }}" = "true" ]; then FLAGS="$FLAGS --skip-results"; fi
          python scripts/update_market.py $FLAGS
      - name: Detect newly triggered technical alerts
        run: python scripts/report_alerts.py --before /tmp/market-before.json --after data/market.json --output /tmp/new-alerts.md
      - name: Add alerts to workflow summary
        run: |
          if [ -s /tmp/new-alerts.md ]; then cat /tmp/new-alerts.md >> "$GITHUB_STEP_SUMMARY"; fi
      - name: Create one GitHub issue for new alerts
        if: ${{ vars.CREATE_GITHUB_ALERT_ISSUES != 'false' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -s /tmp/new-alerts.md ]; then exit 0; fi
          TITLE="Portfolio technical alerts - $(date -u +%F)"
          EXISTING=$(gh issue list --state open --search "$TITLE in:title" --json number --jq 'length')
          if [ "$EXISTING" = "0" ]; then
            gh issue create --title "$TITLE" --body-file /tmp/new-alerts.md
          fi
      - name: Commit static fallback data when changed
        run: |
          git config user.name "portfolio-data-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          git diff --cached --quiet || git commit -m "data: refresh portfolio snapshot"
          git push
      - name: Prepare private-safe Pages artifact
        run: |
          mkdir -p _site
          rsync -a ./ _site/ \
            --exclude '.git/' --exclude '.github/' --exclude '_site/' \
            --exclude 'setup/' --exclude 'scripts/' --exclude 'supabase/' \
            --exclude 'README.md' --exclude '.gitignore'
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site
      - name: Deploy refreshed dashboard
        id: deployment
        uses: actions/deploy-pages@v4

  notify-on-failure:
    needs: refresh
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = `Portfolio refresh failed: ${new Date().toISOString().slice(0,10)}`;
            const body = `The scheduled portfolio refresh failed. Open the Actions tab for logs: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({...context.repo, title, body, labels: []});
